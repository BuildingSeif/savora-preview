    <script>
    // Map marker tooltips
    (function(){
      const tip = document.getElementById('mapTooltip');
      const container = tip?.parentElement;
      if (!tip || !container) return;
      container.querySelectorAll('.map-marker').forEach(function(m){
        m.addEventListener('mouseenter', function(e){
          const rect = container.getBoundingClientRect();
          const circle = m.querySelector('circle');
          const svg = container.querySelector('svg');
          const svgRect = svg.getBoundingClientRect();
          const cx = parseFloat(circle.getAttribute('cx'));
          const cy = parseFloat(circle.getAttribute('cy'));
          const viewBox = svg.viewBox.baseVal;
          const scaleX = svgRect.width / viewBox.width;
          const scaleY = svgRect.height / viewBox.height;
          const left = (cx * scaleX) + (svgRect.left - rect.left);
          const top = (cy * scaleY) + (svgRect.top - rect.top) - 28;
          tip.textContent = m.getAttribute('data-tooltip');
          tip.style.display = 'block';
          tip.style.opacity = '1';
          tip.style.left = left + 'px';
          tip.style.top = top + 'px';
        });
        m.addEventListener('mouseleave', function(){
          tip.style.opacity = '0';
          setTimeout(function(){ tip.style.display = 'none'; }, 200);
        });
      });
    })();
